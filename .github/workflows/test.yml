name: Tests and Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  APP_VERSION: ${{ secrets.APP_VERSION }}
  LOG_LEVEL: ${{ secrets.LOG_LEVEL }}

jobs:
  test:
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.1.0
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      
      - name: Analyze code
        run: dart analyze
      
      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
        run: dart test
      
      - name: Check pub publish
        run: dart pub publish --dry-run

  build:
    runs-on: ubuntu-latest
    needs: test
    environment: development
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.1.0
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Build executable
        run: dart compile exe bin/flutter_architect_ai.dart -o flutter_architect_ai
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter_architect_ai-exe
          path: flutter_architect_ai

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: development
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.1.0
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Publish to pub.dev
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          mkdir -p ~/.pub-cache
          echo "$PUB_CREDENTIALS" > ~/.config/dart/pub-credentials.json
          dart pub publish --force
